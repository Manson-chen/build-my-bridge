              - paragraph [ref=e197]: 最后，使用OpenAPI3的规范注解，注释各个Spring的REST接口，示例代码如下：
              - generic [ref=e199]:
                - code [ref=e201]:
                  - generic [ref=e202]: "@RestController"
                  - generic [ref=e203]: "@RequestMapping(\"body\")"
                  - generic [ref=e204]: "@Tag(name = \"body参数\")"
                  - generic [ref=e205]: "public class BodyController {"
                  - generic [ref=e206]: "@Operation(summary = \"普通body请求\")"
                  - generic [ref=e207]: "@PostMapping(\"/body\")"
                  - generic [ref=e208]: "public ResponseEntity<FileResp> body(@RequestBody FileResp fileResp){"
                  - generic [ref=e209]: return ResponseEntity.ok(fileResp);
                  - generic [ref=e210]: "}"
                  - generic [ref=e211]: "@Operation(summary = \"普通body请求+Param+Header+Path\")"
                  - generic [ref=e212]: "@Parameters({"
                  - generic [ref=e213]: "@Parameter(name = \"id\",description = \"文件id\",in = ParameterIn.PATH),"
                  - generic [ref=e214]: "@Parameter(name = \"token\",description = \"请求token\",required = true,in = ParameterIn.HEADER),"
                  - generic [ref=e215]: "@Parameter(name = \"name\",description = \"文件名称\",required = true,in=ParameterIn.QUERY)"
                  - generic [ref=e216]: "})"
                  - generic [ref=e217]: "@PostMapping(\"/bodyParamHeaderPath/{id}\")"
                  - generic [ref=e218]: "public ResponseEntity<FileResp> bodyParamHeaderPath(@PathVariable(\"id\") String id,@RequestHeader(\"token\") String token, @RequestParam(\"name\")String name,@RequestBody FileResp fileResp){"
                  - generic [ref=e219]: fileResp.setName(fileResp.getName()+",receiveName:"+name+",token:"+token+",pathID:"+id);
                  - generic [ref=e220]: return ResponseEntity.ok(fileResp);
                  - generic [ref=e221]: "}"
                  - generic [ref=e222]: "}"
