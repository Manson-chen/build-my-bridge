              - heading "OpenAPI3#" [level=3] [ref=e313]:
                - text: OpenAPI3
                - link "#" [ref=e314] [cursor=pointer]:
                  - /url: "#openapi3"
              - paragraph [ref=e315]: OpenAPI3的规范，目前针对Java的Spring Boot项目，主要支持的有2个版本
              - list [ref=e316]:
                - listitem [ref=e317]:
                  - strong [ref=e318]: springfox 3.0.0：
                  - text: 同时兼容OpenAPI2以及OpenAPI3，但是停更很久了
                - listitem [ref=e319]:
                  - strong [ref=e320]: springdoc-openapi：
                  - text: 兼容OpenAPI3规范，更新速度频繁
              - paragraph [ref=e321]: Knife4j在只有的OpenAPI3规范中，底层基础框架选择springdoc-openapi项目
              - paragraph [ref=e322]:
                - strong [ref=e323]: 针对Springfox3.0.0版本会放弃。
              - paragraph [ref=e324]: 建议开发者如果使用OpenAPI3规范的话，也尽快迁移过来。
              - paragraph [ref=e325]:
                - text: 可以使用
                - code [ref=e326]: knife4j-openapi3-spring-boot-starter
                - text: ",maven 坐标如下："
              - generic [ref=e328]:
