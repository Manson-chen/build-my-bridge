              - heading "OpenAPI2#" [level=3] [ref=e250]:
                - text: OpenAPI2
                - link "#" [ref=e251] [cursor=pointer]:
                  - /url: "#openapi2"
              - paragraph [ref=e252]: OpenAPI2(Swagger)规范是Knife4j之前一直提供支持的版本，底层依赖框架为Springfox,此次在4.0版本开始
              - paragraph [ref=e253]: Knife4j有了新的变化，主要有以下几点：
              - list [ref=e254]:
                - listitem [ref=e255]:
                  - text: Springfox版本选择的依然是
                  - strong [ref=e256]: 2.10.5
                  - text: 版本，而并非springfox最新3.0.0版本
                - listitem [ref=e257]: 不支持以Springfox框架为基础的OpenAPI3规范,放弃Springfox项目的后续版本适配支持工作
                - listitem [ref=e258]: Spring Boot 版本建议 2.4.0~3.0.0之间
              - paragraph [ref=e259]:
                - text: 可以使用
                - code [ref=e260]: knife4j-openapi2-spring-boot-starter
                - text: ",maven 坐标如下："
